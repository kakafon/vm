<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏒 Ishockey VM 2026 – Norge</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1c;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);
  --red:#EF2B2D;--blue:#60a5fa;--purple:#a78bfa;--green:#4ade80;--danger:#f87171;--muted:rgba(255,255,255,.42);
  --font-d:'Barlow Condensed',sans-serif;--font-b:'DM Sans',sans-serif;
}
body{background:var(--bg);background-image:radial-gradient(ellipse at 15% 15%,rgba(0,40,104,.35) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(239,43,45,.12) 0%,transparent 50%);color:#fff;font-family:var(--font-b);min-height:100vh;padding-bottom:40px}
/* Header */
.hdr{background:rgba(0,0,0,.45);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-title{font-family:var(--font-d);font-size:20px;font-weight:900;letter-spacing:.05em;text-transform:uppercase}
.hdr-title span{color:var(--red)}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:3px}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
/* Tabs */
.tabs{border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px}
.tab{background:none;border:none;cursor:pointer;color:var(--muted);font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:rgba(255,255,255,.8)}
.tab.on{color:var(--red);border-bottom-color:var(--red)}
/* Panels */
.panels{padding:18px 20px;max-width:860px;margin:0 auto}
.panel{display:none;flex-direction:column;gap:14px}
.panel.on{display:flex}
/* Card */
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border)}
.lbl{font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
/* Hero */
.hero{background:linear-gradient(135deg,rgba(239,43,45,.22) 0%,rgba(0,40,104,.35) 100%);border-radius:16px;padding:18px 20px;border:1px solid rgba(239,43,45,.4);display:flex;flex-wrap:wrap;gap:20px;align-items:center}
.hero.q4{border-color:rgba(74,222,128,.4)}
.hero-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.hero-pos{font-family:var(--font-d);font-size:30px;font-weight:900}
.hero-pos span{color:rgba(255,255,255,.35);font-size:18px}
.hero-qf{font-size:12px;color:var(--green);font-weight:700;margin-top:4px}
.s-val{font-family:var(--font-d);font-size:26px;font-weight:900;text-align:center}
.s-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:center}
/* Standings table */
.tbl-wrap{overflow-x:auto}
table.st{width:100%;border-collapse:collapse;font-size:13px}
table.st thead tr{border-bottom:1px solid rgba(255,255,255,.1);color:var(--muted)}
table.st th{padding:4px 5px;font-size:11px;font-weight:600;white-space:nowrap}
table.st th:nth-child(n+3){text-align:center}
table.st td{padding:6px 5px;white-space:nowrap}
table.st td:nth-child(n+3){text-align:center;color:rgba(255,255,255,.6)}
table.st tr.nor{background:rgba(239,43,45,.18);border-left:3px solid var(--red)}
table.st tr:not(.nor){border-left:3px solid transparent}
table.st tr:not(.nor):nth-child(even){background:rgba(255,255,255,.02)}
.pts{color:#fff!important;font-weight:700!important}
.gd-p{color:var(--green)!important}
.gd-n{color:var(--danger)!important}
.pq{color:var(--green)!important;font-weight:700}
.pr{color:var(--danger)!important;font-weight:700}
.nor-team{color:#fff;font-weight:700}
.bdg{border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700}
.bdg-q{background:#16a34a;color:#fff}
.bdg-r{background:#dc2626;color:#fff}
.leg{margin-top:10px;display:flex;gap:14px;font-size:11px;color:rgba(255,255,255,.3)}
/* Schedule */
.nor-card{background:rgba(239,43,45,.07);border:1px solid rgba(239,43,45,.3)!important}
.sch{display:flex;flex-direction:column;gap:8px}
.sch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.04)}
.sch-row.unp{background:rgba(255,255,255,.02);opacity:.9}
.sch-meta{font-size:11px;color:var(--muted)}
.sch-match{color:#fff;font-weight:600;margin-top:3px}
.sch-score{background:rgba(255,255,255,.1);border-radius:8px;padding:3px 12px;font-weight:700;font-size:15px;font-family:monospace;display:flex;flex-direction:column;align-items:center;gap:2px}
.verd{font-size:10px;font-weight:700;font-family:var(--font-b)}
.verd.w{color:var(--green)}.verd.l{color:var(--danger)}
.sch-up{background:rgba(255,255,255,.08);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted)}
/* Results */
.res-list{display:flex;flex-direction:column;gap:5px}
.res-row{display:grid;grid-template-columns:62px 1fr 64px 1fr;gap:8px;align-items:center;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.025);border-left:3px solid transparent;font-size:13px}
.res-row.hl{background:rgba(239,43,45,.15);border-left-color:var(--red)}
.res-date{color:rgba(255,255,255,.38);font-size:11px}
.res-h{color:rgba(255,255,255,.85);text-align:right}
.res-a{color:rgba(255,255,255,.85)}
.res-sc{background:rgba(255,255,255,.1);border-radius:6px;padding:2px 6px;text-align:center;font-weight:700;color:#fff;font-family:monospace}
/* Button */
.rbtn{background:rgba(239,43,45,.15);border:1px solid rgba(239,43,45,.4);color:var(--red);font-weight:700;font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-b);transition:all .2s}
.rbtn:hover{background:rgba(239,43,45,.3)}
.rbtn:disabled{opacity:.45;cursor:not-allowed}
.msg{font-size:11px}
.ok{color:var(--green)}.warn{color:#fb923c}
footer{text-align:center;font-size:11px;color:rgba(255,255,255,.18);margin-top:10px}
@media(max-width:480px){
  .hdr-title{font-size:16px}.tab{font-size:12px;padding:8px 10px}
  .hero-pos{font-size:24px}.s-val{font-size:22px}
  .res-row{grid-template-columns:50px 1fr 54px 1fr;font-size:12px}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">🏒 Ishockey VM 2026 <span>· Norge</span></div>
    <div class="hdr-sub">Sveits · 15–31. mai · <span id="upd">Laster…</span></div>
  </div>
  <div class="hdr-r">
    <button class="rbtn" id="rbtn" onclick="doRefresh()">⟳ Oppdater</button>
    <div class="msg" id="msg"></div>

</div>

<div class="tabs">

    <div class="card">
      <div class="lbl" style="color:var(--purple)">Gruppe A · Tabell <span id="a-src" style="font-size:10px;font-weight:400;opacity:.5"></span></div>
      <div class="tbl-wrap"><table class="st" id="tbl-a"></table></div>
      <div class="leg"><span><span style="color:var(--green)">■</span> KF = Kvartfinale (topp 4)</span><span><span style="color:var(--danger)">■</span> NED = Nedrykk</span></div>

  <div class="panel" id="panel-r">
    <div class="card">
      <div class="lbl" style="color:#fb923c">Gruppe B · Resultater</div>
      <div class="res-list" id="res"><!-- filled by JS --></div>
    </div>
  </div>
</div>

<footer>Tabell hentes fra Wikipedia · Oppdater for siste resultater</footer>

<script>
// ── Lagdata ────────────────────────────────────────────────────────────────────
const TEAM = {
  'canada':         {f:'🇨🇦', no:'Canada'},
  'sweden':         {f:'🇸🇪', no:'Sverige'},
  'czechia':        {f:'🇨🇿', no:'Tsjekkia'},
  'czech republic': {f:'🇨🇿', no:'Tsjekkia'},
  'denmark':        {f:'🇩🇰', no:'Danmark'},
  'slovakia':       {f:'🇸🇰', no:'Slovakia'},
  'norway':         {f:'🇳🇴', no:'Norge'},
  'slovenia':       {f:'🇸🇮', no:'Slovenia'},
  'italy':          {f:'🇮🇹', no:'Italia'},
  'finland':        {f:'🇫🇮', no:'Finland'},
  'switzerland':    {f:'🇨🇭', no:'Sveits'},
  'germany':        {f:'🇩🇪', no:'Tyskland'},
  'latvia':         {f:'🇱🇻', no:'Latvia'},
  'austria':        {f:'🇦🇹', no:'Østerrike'},
  'united states':  {f:'🇺🇸', no:'USA'},
  'usa':            {f:'🇺🇸', no:'USA'},
  'hungary':        {f:'🇭🇺', no:'Ungarn'},
  'great britain':  {f:'🇬🇧', no:'Storbritannia'},
};
function teamLookup(txt) {
  const k = txt.toLowerCase().replace(/\s*\(.*?\)/g,'').trim();
  for (const [key,val] of Object.entries(TEAM))
    if (k.includes(key)) return val;
  return {f:'🏒', no: txt.charAt(0).toUpperCase()+txt.slice(1)};
}

// ── Fallback-data (19. mai 2026) ───────────────────────────────────────────────
const FB_B = [
  {pos:1,team:'🇨🇦 Canada',  pld:3,w:3,otw:0,otl:0,l:0,gf:17,ga:3, gd:14, pts:9,qual:'Q'},
  {pos:2,team:'🇸🇰 Slovakia', pld:3,w:2,otw:0,otl:0,l:1,gf:8, ga:6, gd:2,  pts:6,qual:'Q'},
  {pos:3,team:'🇸🇪 Sverige',  pld:3,w:2,otw:0,otl:0,l:1,gf:12,ga:6, gd:6,  pts:6,qual:'Q'},
  {pos:4,team:'🇳🇴 Norge',    pld:3,w:2,otw:0,otl:0,l:1,gf:8, ga:2, gd:6,  pts:6,qual:'Q',isN:true},
  {pos:5,team:'🇨🇿 Tsjekkia', pld:3,w:1,otw:1,otl:0,l:1,gf:9, ga:8, gd:1,  pts:5,qual:''},
  {pos:6,team:'🇩🇰 Danmark',  pld:3,w:1,otw:0,otl:0,l:2,gf:5, ga:14,gd:-9, pts:3,qual:''},
  {pos:7,team:'🇸🇮 Slovenia', pld:3,w:1,otw:0,otl:0,l:2,gf:3, ga:8, gd:-5, pts:3,qual:''},
  {pos:8,team:'🇮🇹 Italia',   pld:3,w:0,otw:0,otl:0,l:3,gf:1, ga:14,gd:-13,pts:0,qual:'R'},
];
const FB_A = [
  {pos:1,team:'🇫🇮 Finland',       pld:2,w:2,otw:0,otl:0,l:0,gf:10,ga:3, gd:7, pts:6,qual:'Q'},
  {pos:2,team:'🇨🇭 Sveits',        pld:2,w:2,otw:0,otl:0,l:0,gf:8, ga:4, gd:4, pts:6,qual:'Q'},
  {pos:3,team:'🇦🇹 Østerrike',     pld:3,w:2,otw:0,otl:0,l:1,gf:10,ga:5, gd:5, pts:6,qual:'Q'},
  {pos:4,team:'🇱🇻 Latvia',        pld:3,w:1,otw:0,otl:0,l:2,gf:5, ga:9, gd:-4,pts:3,qual:'Q'},
  {pos:5,team:'🇩🇪 Tyskland',      pld:2,w:1,otw:0,otl:0,l:1,gf:2, ga:7, gd:-5,pts:3,qual:''},
  {pos:6,team:'🇭🇺 Ungarn',        pld:3,w:1,otw:0,otl:0,l:2,gf:8, ga:12,gd:-4,pts:3,qual:''},
  {pos:7,team:'🇺🇸 USA',           pld:3,w:0,otw:0,otl:0,l:3,gf:3, ga:16,gd:-13,pts:0,qual:''},
  {pos:8,team:'🇬🇧 Storbritannia', pld:3,w:0,otw:0,otl:0,l:3,gf:3, ga:15,gd:-12,pts:0,qual:'R'},
];
const SCHEDULE = [
  {date:'16. mai',time:'12:20',opp:'🇸🇰 Slovakia',res:'1–2',venue:'Fribourg'},
  {date:'17. mai',time:'20:20',opp:'🇸🇮 Slovenia',res:'4–0',venue:'Fribourg'},
  {date:'19. mai',time:'16:20',opp:'🇮🇹 Italia',  res:'4–0',venue:'Fribourg'},
  {date:'21. mai',time:'16:20',opp:'🇨🇦 Canada',  res:null, venue:'Fribourg'},
  {date:'23. mai',time:'20:20',opp:'🇸🇪 Sverige', res:null, venue:'Fribourg'},
  {date:'25. mai',time:'16:20',opp:'🇨🇿 Tsjekkia',res:null, venue:'Fribourg'},
  {date:'26. mai',time:'12:20',opp:'🇩🇰 Danmark', res:null, venue:'Fribourg'},
];
const RESULTS = [
  {date:'16. mai',home:'🇸🇰 Slovakia',away:'🇳🇴 Norge',   score:'2–1',   hl:true},
  {date:'16. mai',home:'🇮🇹 Italia',  away:'🇨🇦 Canada',  score:'0–6',   hl:false},
  {date:'16. mai',home:'🇸🇮 Slovenia',away:'🇨🇿 Tsjekkia',score:'3–2 OT',hl:false},
  {date:'17. mai',home:'🇮🇹 Italia',  away:'🇸🇰 Slovakia',score:'1–4',   hl:false},
  {date:'17. mai',home:'🇩🇰 Danmark', away:'🇸🇪 Sverige', score:'2–6',   hl:false},
  {date:'17. mai',home:'🇳🇴 Norge',   away:'🇸🇮 Slovenia',score:'4–0',   hl:true},
  {date:'18. mai',home:'🇨🇦 Canada',  away:'🇩🇰 Danmark', score:'5–1',   hl:false},
  {date:'18. mai',home:'🇨🇿 Tsjekkia',away:'🇸🇪 Sverige', score:'4–3',   hl:false},
  {date:'19. mai',home:'🇮🇹 Italia',  away:'🇳🇴 Norge',   score:'0–4',   hl:true},
  {date:'19. mai',home:'🇸🇰 Slovakia',away:'🇸🇮 Slovenia',score:'5–4',   hl:false},
];

// ── Wikipedia-parsing ──────────────────────────────────────────────────────────
async function fetchWiki(page) {
  const url = `https://en.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(page)}&prop=text&format=json&origin=*`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error.info || 'Wikipedia-feil');
  return new DOMParser().parseFromString(d.parse.text['*'], 'text/html');
}

function parseStandings(doc) {
  for (const tbl of doc.querySelectorAll('table.wikitable')) {
    const hdr = [...(tbl.querySelector('tr')?.querySelectorAll('th') || [])]
      .map(th => th.textContent.trim().replace(/\s+/g,' ').toUpperCase());

    if (!hdr.some(h => h==='PLD'||h==='GP') || !hdr.some(h => h==='PTS'||h==='PT')) continue;

    const ci = (names) => { const i = hdr.findIndex(h=>names.includes(h)); return i>=0?i:undefined; };
    const col = {
      pos: ci(['#','POS']) ?? 0,
      team: ci(['TEAM']) ?? 1,
      pld: ci(['PLD','GP']),
      w:   ci(['W']),
      otw: ci(['OTW']),
      otl: ci(['OTL']),
      l:   ci(['L']),
      gf:  ci(['GF']),
      ga:  ci(['GA']),
      gd:  ci(['GD','+/−','±']),
      pts: ci(['PTS','PT']),
    };
    if (col.pld===undefined || col.pts===undefined) continue;

    const rows = [];
    for (const tr of tbl.querySelectorAll('tbody tr')) {
      const cells = [...tr.querySelectorAll('td,th')];
      if (cells.length < 6) continue;
      const get = i => i!==undefined && i<cells.length
        ? cells[i].textContent.trim().replace(/\[.*?\]/g,'').replace(/\u00a0/g,' ').trim() : '';
      const posT = get(col.pos);
      if (!/^\d+$/.test(posT)) continue;

      const teamT = get(col.team);
      if (!teamT || teamT.length<2) continue;

      const pos = +posT;
      const pld = +get(col.pld)||0, w=+get(col.w)||0, otw=+(col.otw!==undefined?get(col.otw):0)||0;
      const otl = +(col.otl!==undefined?get(col.otl):0)||0, l=+get(col.l)||0;
      const gf  = +get(col.gf)||0, ga=+get(col.ga)||0;
      const gdR = get(col.gd), gd = col.gd!==undefined ? (parseInt(gdR.replace(/\+/,''))||gf-ga) : gf-ga;
      const pts = +get(col.pts)||0;
      const qual= pos<=4?'Q':pos===8?'R':'';
      const td  = teamLookup(teamT);
      rows.push({pos,team:`${td.f} ${td.no}`,pld,w,otw,otl,l,gf,ga,gd,pts,qual,isN:/norway/i.test(teamT)||/norge/i.test(teamT)});
    }
    if (rows.length>=4) return rows;
  }
  return null;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderHero(st) {
  const n = st.find(r=>r.isN);
  if (!n) return;
  const inQ = n.pos<=4, gds = n.gd>0?`+${n.gd}`:n.gd;
  document.getElementById('hero').className = 'hero'+(inQ?' q4':'');
  document.getElementById('hero').innerHTML = `
    <div>
      <div class="hero-lbl">🇳🇴 Norge · Gruppe B</div>
      <div class="hero-pos">Plass ${n.pos} <span>av 8</span></div>
      ${inQ?'<div class="hero-qf">✓ Kvalifisert til kvartfinale</div>':''}
    </div>
    ${[['Poeng',n.pts,'#fff'],['Spilt',n.pld,'rgba(255,255,255,.7)'],['Seire',n.w,'var(--green)'],
       ['Tap',n.l,'var(--danger)'],['MF',gds,n.gd>=0?'var(--green)':'var(--danger)']].map(([l,v,c])=>
      `<div><div class="s-val" style="color:${c}">${v}</div><div class="s-lbl">${l}</div></div>`
    ).join('')}`;
}

function renderTable(id, rows) {
  const HDRS = ['#','Lag','KP','V','OV','OT','T','MF','MM','MD','P',''];
  const thead = `<thead><tr>${HDRS.map((h,i)=>`<th style="text-align:${i<=1?'left':'center'}">${h}</th>`).join('')}</tr></thead>`;
  const tbody = rows.map((r,i)=>{
    const gds = r.gd>0?`+${r.gd}`:r.gd;
    return `<tr class="${r.isN?'nor':''}">
      <td class="${r.qual==='Q'?'pq':r.qual==='R'?'pr':''}">${r.pos}</td>
      <td class="${r.isN?'nor-team':''}">${r.team}</td>
      <td>${r.pld}</td><td>${r.w}</td><td>${r.otw}</td><td>${r.otl}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td>
      <td class="${r.gd>0?'gd-p':r.gd<0?'gd-n':''}">${gds}</td>
      <td class="pts">${r.pts}</td>
      <td>${r.qual==='Q'?'<span class="bdg bdg-q">KF</span>':r.qual==='R'?'<span class="bdg bdg-r">NED</span>':''}</td>
    </tr>`;
  }).join('');
  document.getElementById(id).innerHTML = thead+`<tbody>${tbody}</tbody>`;
}

function renderSchedule() {
  document.getElementById('sch').innerHTML = SCHEDULE.map(g=>{
    const played = g.res!==null;
    const [a,b] = (g.res||'0-0').split(/[–\-]/).map(Number);
    const isW=played&&a>b, isL=played&&a<b;
    return `<div class="sch-row ${played?'':'unp'}">
      <div>
        <div class="sch-meta">${g.date} · ${g.time} · ${g.venue}</div>
        <div class="sch-match">🇳🇴 Norge vs ${g.opp}</div>
      </div>
      ${played
        ?`<div class="sch-score"><span>${g.res}</span><span class="verd ${isW?'w':isL?'l':''}">${isW?'SEIER':isL?'TAP':'UAVGJORT'}</span></div>`
        :`<span class="sch-up">Kommende</span>`}
    </div>`;
  }).join('');
}

function renderResults() {
  document.getElementById('res').innerHTML = RESULTS.map(r=>`
    <div class="res-row ${r.hl?'hl':''}">
      <span class="res-date">${r.date}</span>
      <span class="res-h">${r.home}</span>
      <span class="res-sc">${r.score}</span>
      <span class="res-a">${r.away}</span>
    </div>`).join('');
}

// ── Tabs ───────────────────────────────────────────────────────────────────────
function tab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  btn.classList.add('on');
}

// ── Refresh ────────────────────────────────────────────────────────────────────
async function doRefresh() {
  const btn = document.getElementById('rbtn');
  const msg = document.getElementById('msg');
  btn.disabled = true; btn.textContent = '⟳ Henter…';
  msg.className='msg'; msg.textContent='Henter fra Wikipedia…';

  let bSt = null, aSt = null, anyOk = false;

  try {
    const docB = await fetchWiki('2026_IIHF_World_Championship_Group_B');
    bSt = parseStandings(docB);
    if (bSt) {
      renderHero(bSt); renderTable('tbl-b', bSt);
      document.getElementById('b-src').textContent = '(Wikipedia)';
      anyOk = true;
    }
  } catch(e) { console.warn('Gruppe B:', e.message); }

  try {
    const docA = await fetchWiki('2026_IIHF_World_Championship_Group_A');
    aSt = parseStandings(docA);
    if (aSt) {
      renderTable('tbl-a', aSt);
      document.getElementById('a-src').textContent = '(Wikipedia)';
      anyOk = true;
    }
  } catch(e) { console.warn('Gruppe A:', e.message); }

  const now = new Date().toLocaleString('no-NO',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  document.getElementById('upd').textContent = now;

  if (anyOk) {
    msg.className='msg ok'; msg.textContent='✓ Tabell oppdatert fra Wikipedia';
    if (!bSt) { msg.textContent='✓ Gruppe A oppdatert. Gruppe B: bruker lagret data.'; msg.className='msg warn'; }
    if (!aSt && bSt) { msg.textContent='✓ Gruppe B oppdatert. Gruppe A: bruker lagret data.'; msg.className='msg warn'; }
  } else {
    msg.className='msg warn'; msg.textContent='⚠ Wikipedia ikke tilgjengelig – viser lagret data';
  }

  btn.disabled=false; btn.textContent='⟳ Oppdater';
}

// ── Init ───────────────────────────────────────────────────────────────────────
renderHero(FB_B);
renderTable('tbl-b', FB_B);
renderTable('tbl-a', FB_A);
renderSchedule();
renderResults();
document.getElementById('upd').textContent = 'Fallback · 19. mai 2026';

// Auto-hent ved innlasting
doRefresh();
</script>
</body>
</html>
